name: SingleExe

on:
  release:
    types: [ published ]
  push:
  pull_request:


jobs:
  build_appimage:
    runs-on: ubuntu-latest
    container:
      image: fedora:41
    steps:
      - uses: actions/checkout@v4
      - name: setenv
        if: github.event_name == 'release'
        run: |
          echo "RELEASE=1" >> $GITHUB_ENV
      - name: bundle SciQLop
        run: |
          dnf update -y && dnf install -y wget file xz rsync gcc git
          sh scripts/appimage/build.sh
      - name: Save packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SciQLop-x86_64.AppImage
          path: dist/SciQLop-x86_64.AppImage

  build_arm64_dmg:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: setenv
        if : github.event_name == 'release'
        run: |
          echo "RELEASE=1" >> $GITHUB_ENV
      - name: Install signing certificate
        if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      - name: bundle SciQLop
        env:
          CODESIGN_IDENTITY: ${{ (github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && secrets.CODESIGN_IDENTITY || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          brew install graphicsmagick imagemagick dylibbundler
          npm install --global create-dmg
          sh scripts/macos/make_dmg.sh
      - name: Save packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SciQLop-arm64.dmg
          path: dist/SciQLop-*.dmg
      - name: save logs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logs-macOS-arm64
          path: dist/*.log


  build_x86_64_dmg:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: setenv
        if: github.event_name == 'release'
        run: |
          echo "RELEASE=1" >> $GITHUB_ENV
      - name: Install signing certificate
        if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
      - name: bundle SciQLop
        env:
          CODESIGN_IDENTITY: ${{ (github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && secrets.CODESIGN_IDENTITY || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          brew install graphicsmagick imagemagick dylibbundler coreutils
          npm install --global create-dmg
          sh scripts/macos/make_dmg.sh
      - name: Save packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SciQLop-x86_64.dmg
          path: dist/SciQLop-*.dmg
      - name: save logs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logs-macOS-x86_64
          path: dist/*.log

  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: setenv
        if: github.event_name == 'release'
        shell: bash
        run: echo "RELEASE=1" >> $GITHUB_ENV
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Install tools
        run: choco install imagemagick innosetup -y
      - name: Build offline installer
        shell: pwsh
        run: scripts/windows/make_installer.ps1
      - name: Build MSIX
        shell: pwsh
        run: scripts/windows/make_msix.ps1
      - name: Build online installer
        shell: pwsh
        run: scripts/windows/make_online_installer.ps1
      - name: Save offline installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SciQLop-x64-setup.exe
          path: dist/SciQLop-x64-setup.exe
      - name: Save MSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SciQLop-x64.msix
          path: dist/SciQLop-x64.msix
      - name: Save online installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SciQLop-x64-online-setup.exe
          path: dist/SciQLop-x64-online-setup.exe

  Publish:
    runs-on: ubuntu-latest
    needs: [ build_appimage, build_arm64_dmg, build_x86_64_dmg, build_windows ]
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: SciQLop*
          path: dist
          merge-multiple: true
      - name: Publish to GitHub Releases
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv dist/SciQLop-x86_64.AppImage dist/SciQLop-x86_64-${{ github.event.release.tag_name }}.AppImage
          mv dist/SciQLop-arm64.dmg dist/SciQLop-arm64-${{ github.event.release.tag_name }}.dmg
          mv dist/SciQLop-x86_64.dmg dist/SciQLop-x86_64-${{ github.event.release.tag_name }}.dmg
          mv dist/SciQLop-x64-setup.exe dist/SciQLop-x64-setup-${{ github.event.release.tag_name }}.exe
          mv dist/SciQLop-x64-online-setup.exe dist/SciQLop-x64-online-setup-${{ github.event.release.tag_name }}.exe
          mv dist/SciQLop-x64.msix dist/SciQLop-x64-${{ github.event.release.tag_name }}.msix
          gh release upload ${{ github.event.release.tag_name }} dist/SciQLop-x86_64-${{ github.event.release.tag_name }}.AppImage
          gh release upload ${{ github.event.release.tag_name }} dist/SciQLop-arm64-${{ github.event.release.tag_name }}.dmg
          gh release upload ${{ github.event.release.tag_name }} dist/SciQLop-x86_64-${{ github.event.release.tag_name }}.dmg
          gh release upload ${{ github.event.release.tag_name }} dist/SciQLop-x64-setup-${{ github.event.release.tag_name }}.exe
          gh release upload ${{ github.event.release.tag_name }} dist/SciQLop-x64-online-setup-${{ github.event.release.tag_name }}.exe
          gh release upload ${{ github.event.release.tag_name }} dist/SciQLop-x64-${{ github.event.release.tag_name }}.msix